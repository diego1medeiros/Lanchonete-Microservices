name: Docker Build and Push

on:
  push:
    branches:
      - main

jobs:
  docker:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Config Server
      - name: Build Config Server
        uses: docker/build-push-action@v6
        with:
          context: ./config-server
          push: true
          tags: diego1medeiros/config-server:latest

      # Eureka
      - name: Build Eureka
        uses: docker/build-push-action@v6
        with:
          context: ./eureka
          push: true
          tags: diego1medeiros/eureka:latest

      # Gateway
      - name: Build Gateway
        uses: docker/build-push-action@v6
        with:
          context: ./gateway
          push: true
          tags: diego1medeiros/gateway-m:latest

      # Cliente
      - name: Build Cliente
        uses: docker/build-push-action@v6
        with:
          context: ./cliente-ms
          push: true
          tags: diego1medeiros/cliente:latest

      # Funcionários
      - name: Build Funcionarios
        uses: docker/build-push-action@v6
        with:
          context: ./funcionarios-ms
          push: true
          tags: diego1medeiros/funcionario:latest

      # Fornecedores
      - name: Build Fornecedores
        uses: docker/build-push-action@v6
        with:
          context: ./fornecedores-ms
          push: true
          tags: diego1medeiros/fornecedor:latest

      # Produtos
      - name: Build Produtos
        uses: docker/build-push-action@v6
        with:
          context: ./produtos-ms
          push: true
          tags: diego1medeiros/produto:latest

      # Vendas
      - name: Build Vendas
        uses: docker/build-push-action@v6
        with:
          context: ./vendas-ms
          push: true
          tags: diego1medeiros/venda:latest
